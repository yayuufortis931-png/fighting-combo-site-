<style>
body { 
  font-family: Arial, sans-serif; 
  padding: 20px; 
  background: #f9f9f9; 
  margin: 0;
}

.back-buttons { 
  margin-bottom: 20px; 
  text-align: center; 
}

.back-buttons button {
  margin: 0 5px;
  padding: 6px 12px;
  border: none;
  border-radius: 5px;
  background: #444;
  color: #fff;
  cursor: pointer;
}

.combo-row-wrapper {
  display: flex;
  align-items: flex-start;
  gap: 12px; 
  margin-bottom: 25px;
  flex-wrap: wrap;
}

.combo-card {
  background: #f0f0f0;
  border-radius: 12px;
  padding: 15px;
  flex: 1;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.combo-title { 
  font-weight: bold; 
  font-size: 16px; 
  margin-bottom: 10px; 
}

.moves-container { 
  display: flex; 
  flex-wrap: wrap; 
  gap: 10px;
}

.moves-container img { 
  width: 120px; 
  height: 120px; 
  object-fit: contain; 
  border-radius: 8px; 
  background: #ffffff; 
}

@media (max-width: 480px) {
  .combo-row-wrapper { 
    flex-direction: column; 
  }
}
</style>
</head>

<body>

<h2>ガイルおすすめコンボ</h2>

<div class="back-buttons">
  <button onclick="location.href='index.html'">🏠 トップへ戻る</button>
  <button onclick="location.href='ガイル.html'">✏️ コンボ管理ページへ戻る</button>
</div>

<div id="combo-display"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAD4fyc-1VlEEGGO631hhpZqCOqllrQ3og",
  authDomain: "st6-combo-maker.firebaseapp.com",
  projectId: "st6-combo-maker",
  storageBucket: "st6-combo-maker.firebasestorage.app",
  messagingSenderId: "945906359459",
  appId: "1:945906359459:web:59a955b609426cf2893316",
  measurementId: "G-YVFY7H6N9E"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const comboDisplay = document.getElementById("combo-display");

// 🔵 Firestore ドキュメント（ガイル）
const docRef = doc(db, "combos", "ガイル");

onSnapshot(docRef, (docSnap) => {
  comboDisplay.innerHTML = "";

  if (docSnap.exists()) {
    const rows = docSnap.data().rows || [];

    rows.forEach((r) => {
      const wrapper = document.createElement("div");
      wrapper.className = "combo-row-wrapper";

      const card = document.createElement("div");
      card.className = "combo-card";

      const title = document.createElement("div");
      title.className = "combo-title";
      title.textContent = r.title;
      card.appendChild(title);

      const movesContainer = document.createElement("div");
      movesContainer.className = "moves-container";

      r.moves.forEach(mv => {
        const img = document.createElement("img");

        // 🔵 ここを guile フォルダに変更
        img.src = `images/guile/${mv}.png`;

        img.alt = mv;
        movesContainer.appendChild(img);
      });

      card.appendChild(movesContainer);
      wrapper.appendChild(card);
      comboDisplay.appendChild(wrapper);
    });

  } else {
    comboDisplay.innerHTML = "<p>おすすめコンボがまだ登録されていません。</p>";
  }
});
</script>

</body>
</html>
